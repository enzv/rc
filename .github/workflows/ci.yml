name: CI

on:
  push:
    branches:
      - master
    paths:
      - '**/*.go'
      - '**/*.rc'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'
  pull_request:
    paths:
      - '**/*.go'
      - '**/*.rc'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CONTAINER_RUNTIME: docker
  RC_REF_IMAGE: ghcr.io/enzv/plan9port:latest

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Lint
        run: go run . make.rc lint
      - name: Check clean tree
        run: git diff --exit-code
      - name: Test
        run: go run . make.rc test
      - name: Build
        run: go run . make.rc build
